<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Marktrecherche · The Escape Theorie</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --navy:#010D26; --blue:#7CA7EB; --camel:#CDB08F;
    --white:#F4F6FB; --dim:#8892A4; --border:rgba(255,255,255,.08);
    --green:#4ade80;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--navy); color:var(--white); font-family:'Inter',system-ui,sans-serif; min-height:100vh; }

  header {
    background:rgba(1,13,38,.95);
    border-bottom:1px solid var(--border);
    padding:18px 40px;
    display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:10;
  }
  header .logo { font-weight:800; font-size:15px; letter-spacing:.06em; color:var(--blue); }
  header .back { color:var(--dim); font-size:13px; text-decoration:none; display:flex; align-items:center; gap:6px; }
  header .back:hover { color:var(--white); }
  header .meta { font-size:12px; color:var(--dim); }

  .wrap { max-width:860px; margin:0 auto; padding:48px 40px 80px; }

  #content h1 { font-size:26px; font-weight:800; color:var(--white); margin:32px 0 12px; line-height:1.2; }
  #content h2 { font-size:18px; font-weight:700; color:var(--blue); margin:36px 0 10px; padding-bottom:6px; border-bottom:1px solid var(--border); }
  #content h3 { font-size:15px; font-weight:700; color:var(--camel); margin:24px 0 8px; }
  #content h4 { font-size:13px; font-weight:700; color:var(--dim); text-transform:uppercase; letter-spacing:.06em; margin:18px 0 6px; }
  #content p { font-size:14px; line-height:1.75; color:rgba(244,246,251,.85); margin-bottom:14px; }
  #content ul, #content ol { padding-left:20px; margin-bottom:14px; }
  #content li { font-size:14px; line-height:1.7; color:rgba(244,246,251,.85); margin-bottom:4px; }
  #content strong { color:var(--white); font-weight:700; }
  #content em { color:var(--camel); font-style:normal; }
  #content code { background:rgba(124,167,235,.12); color:var(--blue); padding:2px 6px; border-radius:4px; font-size:13px; }
  #content pre { background:rgba(255,255,255,.04); border:1px solid var(--border); border-radius:8px; padding:16px; margin:16px 0; overflow-x:auto; }
  #content pre code { background:none; color:var(--white); padding:0; }
  #content blockquote { border-left:3px solid var(--blue); padding:10px 18px; margin:16px 0; background:rgba(124,167,235,.06); border-radius:0 8px 8px 0; }
  #content blockquote p { color:var(--dim); margin:0; }
  #content a { color:var(--blue); }
  #content hr { border:none; border-top:1px solid var(--border); margin:32px 0; }
  #content table { width:100%; border-collapse:collapse; margin:16px 0; font-size:13px; }
  #content th { background:rgba(124,167,235,.12); color:var(--blue); font-weight:700; padding:10px 14px; text-align:left; border-bottom:1px solid var(--border); }
  #content td { padding:9px 14px; border-bottom:1px solid rgba(255,255,255,.04); color:rgba(244,246,251,.85); }
  #content tr:hover td { background:rgba(255,255,255,.02); }

  .loading { color:var(--dim); font-size:14px; padding:40px 0; }
  .updated-badge {
    display:inline-flex; align-items:center; gap:6px;
    background:rgba(74,222,128,.1); color:var(--green);
    font-size:11px; font-weight:700; padding:4px 10px; border-radius:6px;
    letter-spacing:.04em;
  }
</style>
</head>
<body>

<header>
  <div class="logo">THE ESCAPE THEORIE · Marktrecherche</div>
  <a class="back" href="report.html">← zurück zum Dashboard</a>
  <div class="meta" id="update-info">Wird geladen…</div>
</header>

<div class="wrap">
  <div id="content"><p class="loading">Lade Marktrecherche…</p></div>
</div>

<script>
fetch('marktanalyse.md')
  .then(r => {
    const lastMod = r.headers.get('Last-Modified');
    if (lastMod) {
      const d = new Date(lastMod);
      document.getElementById('update-info').innerHTML =
        `<span class="updated-badge">✓ Aktualisiert ${d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'})}</span>`;
    } else {
      document.getElementById('update-info').textContent = 'Montags automatisch aktualisiert';
    }
    return r.text();
  })
  .then(md => {
    document.getElementById('content').innerHTML = marked.parse(md);
  })
  .catch(() => {
    document.getElementById('content').innerHTML =
      '<p style="color:var(--dim)">Marktrecherche konnte nicht geladen werden.</p>';
  });
</script>
</body>
</html>
